<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicología con Hilo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #1a1024, #2d163d);
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 50px 20px 20px;
}

h1 {
    font-size: clamp(2rem, 5vw, 4rem);
    color: #f3d9ff;
    letter-spacing: 2px;
    margin-bottom: 15px;
}

.descripcion {
    width: min(95%, 900px);
    margin: auto;
    padding: 25px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.35);
}

.descripcion p {
    font-size: clamp(1rem, 2vw, 1.1rem);
    line-height: 1.7;
    color: #f1f1f1;
}

.carousel-container {
    width: min(95%, 900px);
    margin: 50px auto;
    overflow: hidden;
    border-radius: 24px;
    position: relative;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    flex-shrink: 0;
}

.carousel {
    display: flex;
    transition: transform 0.8s ease-in-out;
}

.slide {
    min-width: 100%;
    position: relative;
}

.slide img {
    width: 100%;
    height: clamp(300px, 60vw, 550px);
    object-fit: cover;
    display: block;
}

.info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 18px;
    background: linear-gradient(transparent, rgba(0,0,0,0.88));
}

.info h3 {
    font-size: clamp(1rem, 2vw, 1.6rem);
    margin-bottom: 8px;
}

.precio {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: #7dff9d;
    font-weight: bold;
}

/* Flechas */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    border: none;
    color: white;
    font-size: 2rem;
    width: 55px;
    height: 55px;
    cursor: pointer;
    z-index: 10;
    border-radius: 50%;
    backdrop-filter: blur(6px);
    transition: 0.3s;
}

.arrow:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.08);
}

.prev {
    left: 15px;
}

.next {
    right: 15px;
}

.whatsapp-float {
    position: fixed;
    width: 68px;
    height: 68px;
    bottom: 22px;
    right: 22px;
    background-image: url("img_WTTS.jpeg");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    z-index: 999;
    box-shadow: 0 0 18px rgba(37,211,102,0.5);
    transition: 0.3s ease;
    animation: floaty 2.5s infinite ease-in-out;
}

.whatsapp-float:hover {
    transform: scale(1.12);
}

@keyframes floaty {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

footer {
    margin-top: auto;
    width: 100%;
    padding: 25px 20px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    font-size: 1rem;
    line-height: 1.8;
    color: #d9c2ea;
}

/* Responsive */
@media (max-width: 768px) {
    .carousel-container {
        width: 95%;
    }

    .slide img {
        height: 400px;
    }

    .arrow {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
    }
}

@media (max-width: 480px) {
    .slide img {
        height: 320px;
    }

    .info {
        padding: 12px;
    }

    .arrow {
        width: 40px;
        height: 40px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Psicología con Hilo</h1>
</header>

<section class="descripcion">
    <p>
        Aquí puedes colocar la descripción de Psicología con Hilo.
        Este espacio está diseñado para presentar productos, creaciones,
        mensajes especiales o cualquier contenido que quieras compartir
        con tus visitantes.
    </p>
</section>

<section class="carousel-container">
    <button class="arrow prev" onclick="prevSlide()">❮</button>
    <button class="arrow next" onclick="nextSlide()">❯</button>

    <div class="carousel" id="carousel">
